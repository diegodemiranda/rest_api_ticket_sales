<!-- templates/home.html -->
<!-- Front-end simples que consome a API de pessoas via fetch() -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RP Flask REST API</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1   { color: #333; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    tr:hover { background: #fafafa; }
  </style>
</head>
<body>
  <h1>Pessoas cadastradas</h1>
  <table>
    <thead>
      <tr><th>ID</th><th>Nome</th><th>Sobrenome</th><th>Timestamp</th></tr>
    </thead>
    <tbody id="pessoas">
      <tr><td colspan="4">Carregando...</td></tr>
    </tbody>
  </table>

  <script>
    fetch("/api/people")
      .then(r => r.json())
      .then(pessoas => {
        const tbody = document.getElementById("pessoas");
        tbody.innerHTML = pessoas.map(p => `
          <tr>
            <td>${p.person_id}</td>
            <td>${p.fname}</td>
            <td>${p.lname}</td>
            <td>${p.timestamp}</td>
          </tr>
        `).join("");
      });
  </script>
</body>
</html>

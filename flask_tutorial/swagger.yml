# swagger.yml
# Especificação OpenAPI 3.0 para a API de pessoas.
# O Connexion usa este arquivo para rotear requisições e validar dados.

openapi: 3.0.0

info:
  title: "RP Flask REST API"
  description: "API sobre pessoas — tutorial Real Python (Partes 1 e 2)"
  version: "1.0.0"

servers:
  - url: "/api"

components:
  schemas:
    Person:
      type: object
      properties:
        lname:
          type: string
        fname:
          type: string

paths:
  /people:
    get:
      operationId: "people.read_all"
      tags:
        - "People"
      summary: "Lê a lista completa de pessoas"
      responses:
        "200":
          description: "Lista de pessoas retornada com sucesso"

    post:
      operationId: "people.create"
      tags:
        - "People"
      summary: "Cria uma nova pessoa"
      requestBody:
        description: "Dados da nova pessoa"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Person"
      responses:
        "201":
          description: "Pessoa criada com sucesso"

  /people/{lname}:
    get:
      operationId: "people.read_one"
      tags:
        - "People"
      summary: "Lê os dados de uma pessoa específica"
      parameters:
        - name: lname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Pessoa encontrada"
        "404":
          description: "Pessoa não encontrada"

    put:
      operationId: "people.update"
      tags:
        - "People"
      summary: "Atualiza uma pessoa existente"
      parameters:
        - name: lname
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: "Novos dados da pessoa"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Person"
      responses:
        "200":
          description: "Pessoa atualizada com sucesso"
        "404":
          description: "Pessoa não encontrada"

    delete:
      operationId: "people.delete"
      tags:
        - "People"
      summary: "Remove uma pessoa"
      parameters:
        - name: lname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Pessoa removida com sucesso"
        "404":
          description: "Pessoa não encontrada"

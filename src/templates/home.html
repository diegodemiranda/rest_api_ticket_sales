<!-- templates/home.html -->
<!-- Front-end do sistema de venda de ingressos -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingressos Online</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fa;
      margin: 0; padding: 20px;
      color: #333;
    }
    h1 { text-align: center; color: #1a237e; margin-bottom: 30px; }
    h2 { color: #283593; border-bottom: 2px solid #3f51b5; padding-bottom: 6px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card h3 { margin: 0 0 8px; color: #1a237e; }
    .card .preco { font-size: 1.4em; font-weight: bold; color: #2e7d32; }
    .card .vagas { color: #757575; font-size: 0.9em; margin: 6px 0; }
    .card .info  { font-size: 0.9em; color: #555; margin: 4px 0; }
    .card .sem-vaga { color: #c62828; font-weight: bold; }

    button {
      background: #3f51b5; color: white;
      border: none; border-radius: 6px;
      padding: 10px 18px; cursor: pointer;
      font-size: 0.95em; margin-top: 10px;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #1a237e; }
    button:disabled { background: #9e9e9e; cursor: not-allowed; }

    /* Modal */
    .modal-bg {
      display: none; position: fixed;
      inset: 0; background: rgba(0,0,0,0.5);
      z-index: 100; justify-content: center; align-items: center;
    }
    .modal-bg.aberto { display: flex; }
    .modal {
      background: white; border-radius: 12px;
      padding: 30px; width: 420px; max-width: 95%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .modal h3 { margin-top: 0; color: #1a237e; }
    .modal label { display: block; margin: 12px 0 4px; font-weight: bold; }
    .modal input, .modal select {
      width: 100%; padding: 8px 10px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 0.95em;
    }
    .modal .btns { display: flex; gap: 10px; margin-top: 20px; }
    .modal .btns button { flex: 1; margin: 0; }
    .btn-cancelar { background: #757575 !important; }
    .btn-cancelar:hover { background: #424242 !important; }

    /* Mensagens */
    .msg {
      padding: 12px 16px; border-radius: 8px;
      margin: 16px 0; font-weight: bold;
      display: none;
    }
    .msg.ok    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .msg.erro  { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

    /* Tabela de compras */
    table { width: 100%; border-collapse: collapse; background: white;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th { background: #3f51b5; color: white; padding: 12px; text-align: left; }
    td { padding: 10px 12px; border-bottom: 1px solid #eee; }
    tr:last-child td { border: none; }
    .badge {
      padding: 3px 10px; border-radius: 12px;
      font-size: 0.85em; font-weight: bold;
    }
    .badge.confirmado { background: #e8f5e9; color: #2e7d32; }
    .badge.cancelado  { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>

<h1>🎟️ Ingressos Online</h1>

<!-- Mensagens de feedback -->
<div class="msg" id="msg"></div>

<!-- Eventos disponíveis -->
<h2>Eventos Disponíveis</h2>
<div class="grid" id="grid-eventos">
  <div class="card"><p>Carregando eventos...</p></div>
</div>

<!-- Minhas compras -->
<h2>Todas as Compras</h2>
<table>
  <thead>
    <tr>
      <th>#</th><th>Evento</th><th>Cliente</th>
      <th>Qtd</th><th>Valor Total</th><th>Status</th><th>Ação</th>
    </tr>
  </thead>
  <tbody id="tabela-compras">
    <tr><td colspan="7">Carregando...</td></tr>
  </tbody>
</table>

<!-- Modal de compra -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Comprar Ingresso</h3>
    <p id="modal-evento-nome" style="color:#555;"></p>

    <label>Nome completo</label>
    <input type="text" id="nome" placeholder="João da Silva">

    <label>E-mail</label>
    <input type="email" id="email" placeholder="joao@email.com">

    <label>CPF</label>
    <input type="text" id="cpf" placeholder="000.000.000-00">

    <label>Quantidade (máx. 10)</label>
    <input type="number" id="qtd" value="1" min="1" max="10">

    <div class="btns">
      <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
      <button onclick="confirmarCompra()">Confirmar Compra</button>
    </div>
  </div>
</div>

<script>
  let eventoAtual = null;

  // ─── Utilitários ───────────────────────────
  function mostrarMsg(texto, tipo) {
    const el = document.getElementById("msg");
    el.textContent = texto;
    el.className = "msg " + tipo;
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 4000);
  }

  function formatarData(iso) {
    const d = new Date(iso);
    return d.toLocaleString("pt-BR");
  }

  function formatarBRL(val) {
    return val.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  }

  // ─── Eventos ───────────────────────────────
  async function carregarEventos() {
    const res = await fetch("/api/eventos");
    const eventos = await res.json();
    const grid = document.getElementById("grid-eventos");

    if (!eventos.length) {
      grid.innerHTML = "<div class='card'><p>Nenhum evento cadastrado.</p></div>";
      return;
    }

    grid.innerHTML = eventos.map(e => {
      const semVaga = e.vagas_disponiveis <= 0;
      return `
        <div class="card">
          <h3>${e.nome}</h3>
          <div class="info">📍 ${e.local || "Local a definir"}</div>
          <div class="info">📅 ${formatarData(e.data_evento)}</div>
          <div class="info">${e.descricao || ""}</div>
          <div class="preco">${formatarBRL(e.preco)}</div>
          <div class="vagas ${semVaga ? "sem-vaga" : ""}">
            ${semVaga ? "ESGOTADO" : `${e.vagas_disponiveis} de ${e.capacidade} vagas`}
          </div>
          <button onclick="abrirModal(${e.evento_id}, '${e.nome.replace(/'/g,"\\'")}', ${e.preco})"
                  ${semVaga ? "disabled" : ""}>
            ${semVaga ? "Esgotado" : "Comprar Ingresso"}
          </button>
        </div>
      `;
    }).join("");
  }

  // ─── Modal de compra ───────────────────────
  function abrirModal(eventoId, nome, preco) {
    eventoAtual = { id: eventoId, nome, preco };
    document.getElementById("modal-evento-nome").textContent = "🎫 " + nome;
    document.getElementById("modal-bg").classList.add("aberto");
  }

  function fecharModal() {
    document.getElementById("modal-bg").classList.remove("aberto");
    eventoAtual = null;
    ["nome","email","cpf","qtd"].forEach(id => {
      document.getElementById(id).value = id === "qtd" ? "1" : "";
    });
  }

  async function confirmarCompra() {
    const nome  = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const cpf   = document.getElementById("cpf").value.trim();
    const qtd   = parseInt(document.getElementById("qtd").value);

    if (!nome || !email || !cpf) {
      mostrarMsg("Preencha todos os campos.", "erro"); return;
    }

    const body = {
      evento_id: eventoAtual.id,
      nome_cliente: nome,
      email_cliente: email,
      cpf_cliente: cpf,
      quantidade: qtd,
    };

    try {
      const res = await fetch("/api/ingressos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        const ing = await res.json();
        fecharModal();
        mostrarMsg(
          `✅ Ingresso #${ing.ingresso_id} confirmado! Total: ${formatarBRL(ing.valor_total)}`,
          "ok"
        );
        carregarEventos();
        carregarCompras();
      } else {
        const err = await res.json();
        mostrarMsg("❌ " + (err.detail || "Erro ao comprar."), "erro");
      }
    } catch (e) {
      mostrarMsg("Erro de conexão.", "erro");
    }
  }

  // ─── Tabela de compras ─────────────────────
  async function carregarCompras() {
    const [resIng, resEv] = await Promise.all([
      fetch("/api/ingressos"),
      fetch("/api/eventos"),
    ]);
    const compras = await resIng.json();
    const eventos = await resEv.json();
    const mapEv = Object.fromEntries(eventos.map(e => [e.evento_id, e.nome]));

    const tbody = document.getElementById("tabela-compras");

    if (!compras.length) {
      tbody.innerHTML = "<tr><td colspan='7'>Nenhuma compra ainda.</td></tr>";
      return;
    }

    tbody.innerHTML = compras.map(c => `
      <tr>
        <td>#${c.ingresso_id}</td>
        <td>${mapEv[c.evento_id] || "—"}</td>
        <td>${c.nome_cliente}<br><small>${c.email_cliente}</small></td>
        <td>${c.quantidade}</td>
        <td>${formatarBRL(c.valor_total)}</td>
        <td><span class="badge ${c.status}">${c.status}</span></td>
        <td>
          ${c.status === "confirmado"
            ? `<button onclick="cancelarIngresso(${c.ingresso_id})"
                 style="background:#e53935;width:auto;padding:5px 12px;margin:0;font-size:0.85em">
                 Cancelar</button>`
            : "—"}
        </td>
      </tr>
    `).join("");
  }

  async function cancelarIngresso(id) {
    if (!confirm(`Cancelar ingresso #${id}?`)) return;

    const res = await fetch(`/api/ingressos/${id}`, { method: "DELETE" });
    if (res.ok) {
      mostrarMsg(`Ingresso #${id} cancelado.`, "ok");
      carregarEventos();
      carregarCompras();
    } else {
      mostrarMsg("Erro ao cancelar ingresso.", "erro");
    }
  }

  // ─── Inicialização ─────────────────────────
  carregarEventos();
  carregarCompras();
</script>

</body>
</html>
